name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # The client bundle (npm run build:client) is built with bun.
      - uses: oven-sh/setup-bun@v2

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
